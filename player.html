<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<title>Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
  }
  #stage {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    background: #000;
  }
  .slide {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    opacity: 0;
    transition: opacity 600ms ease;
  }
  .slide.active { opacity: 1; }
  .slide img, .slide video {
    width: 100%; height: 100%;
    object-fit: contain;
    background: #000;
  }
  .slide iframe {
    width: 100%; height: 100%;
    border: 0;
    background: #fff;
  }
  /* Bağlantı yoksa / içerik yoksa gösterilen durum ekranı */
  #status {
    position: absolute; inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #66707a;
    background: #0b0d10;
    text-align: center;
    gap: 14px;
  }
  #status.show { display: flex; }
  #status .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #3a4552;
  }
  #status h1 { font-size: 22px; font-weight: 600; color: #aab4bf; letter-spacing: .3px; }
  #status p { font-size: 14px; color: #5c6570; }

  /* Debug bilgi katmanı: sağ alt köşe, TV kumandasında "i" tuşu veya
     çift dokunuşla açılıp kapanır, normalde gizli */
  #debug {
    position: absolute; right: 10px; bottom: 10px;
    padding: 8px 12px;
    font-size: 11px; line-height: 1.5;
    color: #9fb0c0;
    background: rgba(10,12,15,.72);
    border-radius: 6px;
    display: none;
    z-index: 999;
    font-family: "SFMono-Regular", Consolas, monospace;
  }
  #debug.show { display: block; }
</style>
</head>
<body>

<div id="stage"></div>

<div id="status">
  <div class="dot"></div>
  <h1>İçerik bekleniyor</h1>
  <p id="statusDetail">Sunucudan oynatma listesi alınamadı.</p>
</div>

<div id="debug"></div>

<script src="player.js"></script>
</body>
</html>
